<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — Foodie</title>
  <meta name="description" content="Explore and filter restaurants near you. Filter by rating, status and more." />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/search.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
<div class="app-wrapper">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <!-- Top Header / Location -->
    <header class="search-top-header">
      <div class="location-widget" onclick="openLocationModal()">
        <span class="location-icon">📍</span>
        <div class="location-info">
          <span class="location-label">Current Location</span>
          <span class="location-value" id="locationValue">New York, NY</span>
        </div>
        <span class="location-arrow">▼</span>
      </div>
    </header>

    <!-- Search Hero -->
    <section class="search-hero">
      <div class="search-hero-content">
        <h1 class="search-hero-title">Find the <span class="text-gradient">Best Spots</span> Near You</h1>
        <p class="search-hero-sub">Explore restaurants by name, cuisine, or your favorite neighborhood</p>
        <div class="search-bar-big">
          <span class="search-icon-big">🔍</span>
          <input type="text" id="searchInput" class="search-input-big" placeholder="Search by restaurant name or place..." autocomplete="off" />
          <button class="btn btn-primary" onclick="runSearch()">Search</button>
        </div>
        <div class="quick-tags" id="quickTags"></div>
      </div>
    </section>

    <!-- Filters Bar -->
    <div class="filters-bar">
      <div class="filter-group">
        <label class="filter-label">Rating</label>
        <select class="filter-select" id="ratingFilter">
          <option value="">Any Rating</option>
          <option value="4.5">4.5+</option>
          <option value="4.0">4.0+</option>
          <option value="3.5">3.5+</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Status</label>
        <select class="filter-select" id="statusFilter">
          <option value="">Any</option>
          <option value="open">Open Now</option>
          <option value="closed">Closed</option>
        </select>
      </div>
      <div class="filter-group">
        <label class="filter-label">Sort By</label>
        <select class="filter-select" id="sortFilter">
          <option value="trending">🔥 Trending</option>
          <option value="rating">Rating</option>
          <option value="reviews">Most Reviewed</option>
          <option value="distance">Distance</option>
          <option value="price_asc">Price ↑</option>
          <option value="price_desc">Price ↓</option>
        </select>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="resetFilters()">↺ Reset</button>
    </div>

    <!-- Results -->
    <div class="results-section">
      <div class="results-header">
        <span class="results-count" id="resultsCount">8 restaurants found</span>
        <div class="view-toggle">
          <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')">⊞ Grid</button>
          <button class="view-btn" id="listViewBtn" onclick="setView('list')">☰ List</button>
        </div>
      </div>
      <div class="restaurant-grid" id="restaurantGrid"></div>
    </div>
  </main>
</div>

<!-- Restaurant Detail Modal -->
<div class="modal-overlay" id="restoModal">
  <div class="modal" id="restoModalContent">
    <div class="modal-header">
      <img id="modalImg" src="" alt="" class="modal-cover" />
      <button class="modal-close" onclick="closeRestoModal()">✕</button>
      <div class="modal-cover-info">
        <h2 id="modalName" class="modal-title"></h2>
        <div id="modalStars"></div>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Location Selection Modal -->
<div class="modal-overlay" id="locationModal">
  <div class="modal modal-sm" id="locationModalContent">
    <div class="modal-header-simple" style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid var(--border-subtle)">
      <h3 class="modal-title" style="margin:0; font-size:18px">Select Location</h3>
      <button class="btn-icon" onclick="closeLocationModal()">✕</button>
    </div>
    <div class="modal-body" style="padding:20px">
      <button class="btn btn-primary btn-block" onclick="requestUserLocationFromModal()" style="width:100%; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;">
        <span>📍</span> Use Current Location
      </button>
      
      <div class="divider-text" style="display:flex; align-items:center; color:var(--text-muted); font-size:10px; font-weight:700; gap:10px; margin-bottom:20px">
        <div style="flex:1; height:1px; background:var(--border-subtle)"></div>
        <span>OR MANUALLY ENTER</span>
        <div style="flex:1; height:1px; background:var(--border-subtle)"></div>
      </div>
      
      <div class="input-group" style="margin-top: 10px;">
        <input type="text" id="manualLocationInput" class="input" placeholder="Enter city, area or street..." style="width:100%" autocomplete="off" />
      </div>
      <div id="locationSuggestions" class="location-suggestions"></div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/search.js"></script>
</body>
</html>
