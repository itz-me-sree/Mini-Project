<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Foodie</title>
    <link rel="stylesheet" href="styles/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">🍴</div>
                <h1>Welcome Back</h1>
                <p>Login to your account to continue</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label for="email" class="input-label">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>

                <div class="input-group">
                    <div class="label-row">
                        <label for="password" class="input-label">Password</label>
                        <a href="forgot-password.html" class="forgot-link">Forgot?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-submit-btn">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                <div class="divider"><span>OR</span></div>
                <button class="guest-btn" onclick="continueAsGuest()">Continue as Guest</button>
                
                <div class="admin-link-wrapper">
                    <a href="admin-login.html" class="forgot-link" style="opacity: 0.6;">Admin Login</a>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
