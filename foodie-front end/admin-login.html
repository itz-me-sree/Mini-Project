<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Foodie</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #080808;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #161616;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      width: 56px; height: 56px;
      background: #e63946;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
    }

    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #666; font-size: 13px; margin-bottom: 32px; }

    .form { text-align: left; }

    .form-group { margin-bottom: 18px; }
    label { display:block; font-size:12px; font-weight:600; color:#888; text-transform:uppercase; margin-bottom:7px; letter-spacing:.5px; }

    input {
      width: 100%;
      background: #0e0e0e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 13px 16px;
      color: #f5f5f5;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #e63946; }

    button[type="submit"] {
      width: 100%;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .2s;
    }
    button[type="submit"]:hover { opacity: .88; transform: translateY(-1px); }
    button[type="submit"]:disabled { opacity: .5; cursor: not-allowed; transform: none; }

    .error-msg {
      color: #e63946;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .hint { margin-top: 28px; font-size: 11px; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍴</div>
    <h1>Admin Panel</h1>
    <p class="sub">Sign in with your admin account</p>

    <form class="form" id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@foodie.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" id="loginBtn">Sign In</button>
      <p class="error-msg" id="errorMsg"></p>
    </form>

    <p class="hint">Only accounts with admin role can access this panel.</p>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn     = document.getElementById('loginBtn');
      const errorEl = document.getElementById('errorMsg');

      btn.disabled    = true;
      btn.textContent = 'Signing in...';
      errorEl.style.display = 'none';

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res  = await fetch(`${API_URL}/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!data.success) {
          throw new Error(data.message || 'Login failed');
        }
        if (data.data.role !== 'admin') {
          throw new Error('Access denied. Admin role required.');
        }

        // Store session
        localStorage.setItem('foodie_admin_session', JSON.stringify(data.data));
        window.location.href = 'admin-dashboard.html';

      } catch (err) {
        errorEl.textContent   = err.message;
        errorEl.style.display = 'block';
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
