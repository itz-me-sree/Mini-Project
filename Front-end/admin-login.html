<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Foodie Control Panel</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/admin.css" />
  <style>
    .admin-login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      padding: 20px;
    }
    .admin-login-card {
      background: var(--bg-card);
      width: 100%;
      max-width: 420px;
      padding: 48px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-mild);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .admin-logo {
      margin-bottom: 32px;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .admin-logo .logo-icon {
      width: 64px;
      height: 64px;
      font-size: 32px;
    }
    .admin-badge {
      background: var(--brand-accent);
      color: white;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 12px;
      border-radius: 4px;
      margin-top: 8px;
    }
    .login-form {
      text-align: left;
      margin-top: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .admin-input {
      width: 100%;
      background: var(--bg-card-2);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      color: white;
      font-size: 15px;
      transition: var(--transition);
    }
    .admin-input:focus {
      border-color: var(--brand-accent);
      box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
    }
    .btn-admin-login {
      width: 100%;
      background: var(--brand-accent);
      color: white;
      padding: 14px;
      border-radius: var(--radius-md);
      font-weight: 700;
      font-size: 16px;
      margin-top: 12px;
      transition: var(--transition);
    }
    .btn-admin-login:hover {
      background: #c1121f;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="admin-login-wrapper">
    <div class="admin-login-card fade-in">
      <div class="admin-logo">
        <div class="logo-icon">🍴</div>
        <h1 class="logo-text">Foodie</h1>
        <div class="admin-badge">Admin Access</div>
      </div>

      <form class="login-form" id="adminLoginForm">
        <div class="form-group">
          <label>Admin Email</label>
          <input type="email" class="admin-input" id="adminEmail" placeholder="admin@foodie.com" required>
        </div>
        <div class="form-group">
          <label>Security Password</label>
          <input type="password" class="admin-input" id="adminPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-admin-login" id="loginBtn">Authorize Access</button>
      </form>
      
      <p style="margin-top: 32px; font-size: 12px; color: var(--text-muted);">
        Unauthorized access is strictly prohibited. <br>All attempts are logged.
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const pass = document.getElementById('adminPassword').value;
      const btn = document.getElementById('loginBtn');

      btn.textContent = 'Authenticating...';
      btn.style.opacity = '0.7';

      // Simulate Admin Auth
      setTimeout(() => {
        if (email === 'admin@foodie.com' && pass === 'admin123') {
          const adminSession = {
            id: 99,
            name: 'System Admin',
            handle: '@admin',
            avatar: 'https://i.pravatar.cc/150?u=admin',
            role: 'admin',
            token: 'mock-admin-token-' + Date.now()
          };
          localStorage.setItem('foodie_admin_session', JSON.stringify(adminSession));
          localStorage.setItem('foodie_session', JSON.stringify(adminSession)); // Also set for common app data
          
          console.log('Admin Authenticated. Redirecting...');
          window.location.href = 'admin-dashboard.html';
        } else {
          alert('Invalid admin credentials. Access denied.');
          btn.textContent = 'Authorize Access';
          btn.style.opacity = '1';
        }
      }, 1500);
    });
  </script>
</body>
</html>
