<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie Admin | Professional Control Panel</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Standalone Styles -->
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="admin-layout">
        <!-- ── Sidebar ── -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-box">
                    <div class="logo-circle">🍴</div>
                    <span class="logo-text">Foodie Admin</span>
                </div>
                <button class="btn-icon-small" id="toggleSidebar" title="Toggle Sidebar">☰</button>
            </div>

            <nav class="nav-menu">
                <span class="nav-label">Main Control</span>
                <a href="#" class="nav-item active" data-section="dashboard" data-title="Dashboard">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-section="users" data-title="Users">
                    <span class="nav-icon">👥</span>
                    <span class="nav-text">Users</span>
                </a>
                <a href="#" class="nav-item" data-section="posts" data-title="Posts">
                    <span class="nav-icon">📝</span>
                    <span class="nav-text">Posts Moderation</span>
                </a>
                <a href="#" class="nav-item" data-section="restaurants" data-title="Restaurants">
                    <span class="nav-icon">🏪</span>
                    <span class="nav-text">Restaurants</span>
                </a>

                <span class="nav-label">Systems</span>
                <a href="#" class="nav-item" data-section="reports" data-title="Reports">
                    <span class="nav-icon">🚩</span>
                    <span class="nav-text">Reports</span>
                </a>
                <a href="#" class="nav-item" data-section="analytics" data-title="Analytics">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">Analytics</span>
                </a>
                <a href="#" class="nav-item" data-section="settings" data-title="Settings">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Settings</span>
                </a>

                <div style="margin-top: 40px; padding: 0 12px;">
                    <button class="btn btn-outline nav-item" style="width: 100%; border: 1px solid var(--border-subtle);" id="logoutBtn">
                        <span class="nav-icon">🚪</span>
                        <span class="nav-text">Logout</span>
                    </button>
                </div>
            </nav>
        </aside>

        <!-- ── Main Content Area ── -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="search-box">
                    <input type="text" placeholder="Search for users, restaurants, or IDs...">
                </div>

                <div class="topbar-right">
                    <!-- Theme Toggle -->
                    <div class="theme-switch" id="themeToggle" title="Toggle Light/Dark Mode">
                        <div class="theme-circle">🌙</div>
                    </div>

                    <div class="icon-btn" title="Notifications">
                        <span>🔔</span>
                        <span class="notif-badge"></span>
                    </div>

                    <div class="admin-profile">
                        <img src="https://i.pravatar.cc/150?u=admin" alt="Admin Avatar" class="admin-avatar">
                        <div class="admin-info">
                            <span class="admin-name">Alex Rivera</span>
                            <span class="admin-role">System Administrator</span>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Multi-view Area -->
            <div class="view-area" id="viewArea">
                <!-- Sections loaded by JS -->
                <div class="loader">Initialising dashboard...</div>
            </div>
        </main>
    </div>

    <!-- ── Modals ── -->

    <!-- Generic Confirmation Modal -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="confirmTitle">Confirm Action</h2>
            </div>
            <p id="confirmMessage" style="color: var(--text-secondary); margin-bottom: 32px;">Are you sure you want to perform this action?</p>
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button class="btn" style="background: var(--bg-hover);" id="cancelAction">Cancel</button>
                <button class="btn btn-primary" id="proceedAction">Proceed</button>
            </div>
        </div>
    </div>

    <!-- Add/Edit Restaurant Modal -->
    <div class="modal-overlay" id="restaurantModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="restaurantModalTitle">Add Restaurant</h2>
            </div>
            <form id="restaurantForm">
                <div class="form-group">
                    <label>Restaurant Name</label>
                    <input type="text" class="form-control" name="name" required placeholder="e.g. Sushi Zen">
                </div>
                <div class="form-group">
                    <label>Cuisine</label>
                    <input type="text" class="form-control" name="cuisine" required placeholder="e.g. Japanese">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" class="form-control" name="address" required placeholder="123 Food Street">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end; margin-top: 32px;">
                    <button type="button" class="btn" style="background: var(--bg-hover);" id="closeRestaurantModal">Discard</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Standalone Script -->
    <script src="admin.js"></script>
</body>
</html>
