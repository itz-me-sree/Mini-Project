<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Review | Foodie</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/home.css" />
  <link rel="stylesheet" href="styles/post.css" />
</head>
<body>
<div class="app-wrapper">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="btn-icon" onclick="window.history.back()" style="margin-right: 12px; transform: scale(1.2)">←</button>
        <h1 class="topbar-title">Review Detail</h1>
      </div>
      <div class="topbar-right">
        <div id="headerAuthCTA">
            <button class="btn btn-primary btn-sm" onclick="window.location.href='create-post.html'">✍️ New Review</button>
        </div>
      </div>
    </header>

    <div class="post-page-container">
      <div class="post-vertical-layout">
        <!-- 1. Header: Author Info -->
        <header class="post-v-header">
           <div class="author-block">
              <img class="avatar avatar-md" id="authorAvatar" src="" alt="" />
              <div class="author-info">
                 <div id="authorName" class="fw-700"></div>
                 <div id="postLocation" class="text-muted"></div>
              </div>
           </div>
           <button class="post-more-btn">···</button>
        </header>

        <!-- 2. Main Image -->
        <div class="post-v-visuals">
          <img id="postImage" src="" alt="Post Detail" class="post-main-img" />
        </div>

        <!-- 3. Actions & Stats -->
        <div class="post-v-actions-panel">
          <div class="post-actions" id="postActionsRow">
            <!-- Actions injected here -->
          </div>
          <div class="post-stats">
            <span id="likeCountDisplay" class="fw-700"></span> likes
          </div>
        </div>

        <!-- 4. Caption Area -->
        <div class="post-v-caption-section">
           <p class="post-caption-text">
             <strong id="authorHandle"></strong> <span id="postCaptionText"></span>
           </p>
           <span class="post-time-meta" id="postTimestamp"></span>
        </div>

        <!-- 5. Comments Section -->
        <div class="post-v-comments-section">
           <h3 class="section-title">Comments</h3>
           <div class="comments-blur-container">
              <div id="commentsList" class="comments-list">
                <!-- Comments injected here -->
              </div>
              
              <!-- Guest Blur Overlay -->
              <div id="guestBlurOverlay" class="comments-blur-overlay" style="display:none;">
                <div class="blur-content">
                  <div class="guest-modal-icon">🔒</div>
                  <h3>Community Discussion</h3>
                  <p>Login to view full comments and join the conversation!</p>
                  <div style="display:flex; gap:10px; justify-content:center;">
                      <a href="login.html" class="btn btn-primary btn-sm">Login</a>
                      <a href="signup.html" class="btn btn-secondary btn-sm">Sign Up</a>
                  </div>
                </div>
              </div>
           </div>
        </div>

        <!-- 6. Bottom Interaction (Sticky maybe, but let's flow for now) -->
        <div class="post-v-footer">
           <div class="comment-input-area">
              <button class="emoji-btn">😊</button>
              <input class="post-comment-input" placeholder="Add a comment..." id="postCommentInput" />
              <button class="comment-post-btn" id="postCommentSubmit">Post</button>
           </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="js/app.js"></script>
<script src="js/guest.js"></script>
<script src="js/post.js"></script>
</body>
</html>
